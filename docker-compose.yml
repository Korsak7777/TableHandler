services:
  app:
    image: ${REGISTRY_URL}/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    build: .
    ports:
      - "${APP_PORT:-8081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/stock_prices?currentSchema=stock_prices
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
