databaseChangeLog:
  - changeSet:
      id: 001-create-table-handler
      author: developer
      changes:
        - createTable:
            tableName: table_handler
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: table_data
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: table_type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: table_source
                  type: varchar(255)
                  constraints:
                    nullable: false
